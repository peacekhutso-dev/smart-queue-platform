server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_queue}?useSSL=false&serverTimezone=Africa/Johannesburg&allowPublicKeyRetrieval=true
    username: ${DB_USER:dha_user}
    password: ${DB_PASS:dhapassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

app:
  jwt:
    secret: ${JWT_SECRET:dha-smart-queue-super-secret-key-256-bits}
    expiry: ${JWT_EXPIRY:86400000}
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8001}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  otp:
    expiry-minutes: 5
    length: 6

logging:
  level:
    com.dha: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN